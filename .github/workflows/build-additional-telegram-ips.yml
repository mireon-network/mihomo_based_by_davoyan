name: Update additional telegram ips

on:
  workflow_dispatch:
  schedule:
    - cron: '25 1 * * *'

jobs:
  update-additional-telegram-ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run updater
        run: |
          set -e
          python scripts/build-additional-telegram-ips.py --path rules/domains/additional-telegram-ips.yaml

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "mihomo-rule-sets bot"
          git config user.email "noreply@github.com"

          git add rules/domains/additional-telegram-ips.yaml

          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update additional telegram ips"
          git pull --rebase
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in $(git diff-tree --no-commit-id --name-only -r HEAD); do
            echo "Purging $f"
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$f" -o /dev/null || true
          done