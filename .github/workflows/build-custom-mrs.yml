name: Build custom .mrs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rules/custom/**'
      - 'scripts/build-custom-mrs.py'
      - '.github/workflows/build-custom-mrs.yml'
  schedule:
    - cron: '50 1 * * *'

jobs:
  build-custom-mrs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install mihomo
        run: |
          M_VER=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | \
                  grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Latest mihomo version: $M_VER"
          wget -O mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v${M_VER}/mihomo-linux-amd64-v${M_VER}.gz
          gunzip -f mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo -v

      - name: Build custom .mrs
        run: |
          set -e
          python scripts/build-custom-mrs.py

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "mihomo-rule-sets bot"
          git config user.email "noreply@github.com"

          git add rules/custom/**/*.mrs

          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Rebuild custom .mrs"
          git pull --rebase
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in $(git diff-tree --no-commit-id --name-only -r HEAD); do
            echo "Purging $f"
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$f" -o /dev/null || true
          done
