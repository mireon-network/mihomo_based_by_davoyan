name: Build RU domains lists

on:
  workflow_dispatch:
  schedule:
    # После mirror-external (40 1), который обновляет category-ru-legacy.txt —
    # источник для category-ru.py. Иначе RU-домены собирались бы на вчерашнем legacy.
    - cron: '5 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run:  |
          pip install requests

      - name: Generate country lists
        run: |
          mkdir -p rules
          python scripts/category-ru.py

      - name: Install mihomo
        uses: ./.github/actions/setup-mihomo

      - name: Convert .yaml to .mrs
        run: |
          mihomo convert-ruleset domain yaml rules/category-ru.yaml rules/category-ru.mrs

      - name: Commit and push generated files
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Rule Set RU Domains List Generator"
          git config user.email "noreply@myrepo.com"
          git add rules/category-ru.*
          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update domains lists"
          git pull --rebase
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in $(git diff-tree --no-commit-id --name-only -r HEAD); do
            echo "Purging $f"
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$f" -o /dev/null || true
          done
