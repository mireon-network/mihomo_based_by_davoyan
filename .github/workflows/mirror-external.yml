name: Mirror external rule-sets

on:
  workflow_dispatch:
  schedule:
    - cron: '40 1 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Mirror external sources
        run: |
          python scripts/mirror-external.py

      - name: Commit and push changes
        run: |
          git config user.name "mihomo-rule-sets bot"
          git config user.email "noreply@github.com"

          git add rules/metacubex rules/legiz-ru rules/itdoginfo rules/roscomvpn

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update mirrored external rule-sets"
          git pull --rebase
          git push
