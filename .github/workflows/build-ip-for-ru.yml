name: Build IP for RU lists

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

jobs:
  build-ru-ip-lists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run:  |
          sudo apt update
          sudo apt install -y curl wget git jq
          pip install maxminddb

      - name: Download IPinfo Lite CSV
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          curl -L "https://ipinfo.io/data/ipinfo_lite.csv.gz?token=${IPINFO_TOKEN}" -o rules/ip-for-ru/ipinfo_lite.csv.gz
          gunzip -f rules/ip-for-ru/ipinfo_lite.csv.gz

      - name: Download MaxMind MMDB
        env:
          MAXMIND_ACCOUNT_ID: ${{ secrets.MAXMIND_ACCOUNT_ID }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          set -euo pipefail
      
          mkdir -p rules/ip-for-ru
          workdir="$(mktemp -d)"
      
          curl -fsSL -u "$MAXMIND_ACCOUNT_ID:$MAXMIND_LICENSE_KEY" \
            "https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz" \
            -o "$workdir/GeoLite2-Country.tar.gz"
      
          tar -xzf "$workdir/GeoLite2-Country.tar.gz" -C "$workdir"
      
          mmdb_file="$(find "$workdir" -type f -name '*.mmdb' | head -n 1)"
      
          if [ -z "$mmdb_file" ]; then
            echo "No .mmdb file found in MaxMind archive"
            exit 1
          fi
      
          cp "$mmdb_file" rules/ip-for-ru/maxmind.mmdb

      - name: Generate ip lists
        run: |
          mkdir -p rules/ip-for-ru/lists
          python rules/ip-for-ru/generate.py

      - name: Install mihomo
        run: |
          M_VER=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | \
            grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/v${M_VER}/mihomo-linux-amd64-v${M_VER}.gz"
          gunzip -f mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          mihomo -v

      - name: Convert .yaml to .mrs (ipcidr)
        run: |
          find rules/ip-for-ru/lists -type f -name "*.yaml" -print0 | while IFS= read -r -d '' file; do
            mihomo convert-ruleset ipcidr yaml "$file" "${file%.yaml}.mrs"
          done

      - name: Commit and push generated files
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "IP for RU lists Generator"
          git config user.email "noreply@github.com"
          git add rules/ip-for-ru/lists/*
          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update IP for RU lists"
          git pull --rebase
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in $(git diff-tree --no-commit-id --name-only -r HEAD); do
            echo "Purging $f"
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$f" -o /dev/null || true
          done
