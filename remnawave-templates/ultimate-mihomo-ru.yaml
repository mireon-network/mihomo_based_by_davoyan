dns:
  enable: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  ipv6: false #true - если хотите резолвить в ipv6
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:geosite-private
    - rule-set:geosite-private-custom
    - "*.lan"
    - "*.msftncsi.com"
    - "stun.*.*.*"
    - "stun.*.*"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "*.openwrt.pool.ntp.org"
    - "pool.ntp.org"
    - "ntp.ubuntu.com"
    - "time1.apple.com"
    - "time2.apple.com"
    - "time3.apple.com"
    - "time4.apple.com"
    - "time5.apple.com"
    - "time6.apple.com"
    - "time7.apple.com"
    - "time1.google.com"
    - "time2.google.com"
    - "time3.google.com"
    - "time4.google.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.xboxlive.com"
    - "*.*.stun.playstation.net"
    - "xbox.*.*.microsoft.com"
    - "*.ipv6.microsoft.com"
    - "speedtest.cros.wr.pvp.net"
  # ----
  # Опционально выбираем DNS сервера - меняйте на ваш вкус.
  default-nameserver:
    # DNS для доменов DNS серверов
    - https://94.140.14.14/dns-query#DIRECT #Adguard DNS
    - https://8.8.8.8/dns-query#DIRECT
    - https://77.88.8.8/dns-query#DIRECT
  proxy-server-nameserver:
    # DNS для доменов прокси из раздела proxies
    - https://94.140.14.14/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    - https://77.88.8.8/dns-query#DIRECT
  direct-nameserver:
    # DNS для сайтов идущих через DIRECT
    - https://77.88.8.8/dns-query#DIRECT # Yandex DNS
    - https://8.8.8.8/dns-query#DIRECT # Google DNS
    - 77.88.8.8#DIRECT
  nameserver:
    # Дефолт для ВСЕГО — через прокси (#PROXY): чистый резолв без подмены DNS в РФ.
    # Заблокированные домены резолвятся корректно автоматически, без отдельных
    # rule-set-политик. То, что правила увели в DIRECT, резолвит direct-nameserver.
    - https://8.8.8.8/dns-query#PROXY
    - https://94.140.14.14/dns-query#PROXY
  nameserver-policy:
    # Приватные домены через системный ДНС
    rule-set:geosite-private,geosite-private-custom:
      - system
    # Наш сервис на termix.https443.net попал в oisd-блоклист (+.https443.net).
    # Стоит ВЫШЕ oisd_big → перебивает блокировку (policy матчится сверху вниз).
    "+.termix.https443.net":
      - https://8.8.8.8/dns-query#PROXY
      - https://94.140.14.14/dns-query#PROXY
    # DNS-блокировка рекламы (возвращаем пустой успешный ответ)
    rule-set:oisd_big:
      - rcode://success
    # Discord/YouTube — DNS резолвится через ту же ноду, что и трафик категории
    # (аффинити DNS↔выходной узел: корректный CDN/гео).
    rule-set:discord_domains:
      - https://8.8.8.8/dns-query#💬 Discord
      - https://94.140.14.14/dns-query#💬 Discord
    rule-set:youtube:
      - https://8.8.8.8/dns-query#▶️ YouTube
      - https://94.140.14.14/dns-query#▶️ YouTube

proxies:
  - name: "🇷🇺 Без VPN"
    type: direct
    udp: true
  - name: DNS-OUT
    type: dns

proxy-groups:
  # ============================================================
  # БАЛАНСИРОВЩИК СЕРВЕРОВ
  # Сервера берутся из скрытых хостов Remnawave вида gateway_<провайдер>_<код страны>:
  #   🇫🇮 = 101, 🇩🇪 = 102, 🇫🇷 = 1004
  # Внутри страны — load-balance (sticky-sessions) между всеми провайдерами.
  # ⚡️ Автовыбор — url-test между странами.
  # ============================================================
  - name: 🛡️ VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - ⚡️ Автовыбор
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  - name: 🇫🇮 Финляндия
    type: load-balance
    hidden: true
    lazy: false
    strategy: sticky-sessions
    url: https://www.gstatic.com/generate_204
    interval: 600
