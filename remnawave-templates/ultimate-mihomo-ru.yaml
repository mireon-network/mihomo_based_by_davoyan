  - name: 🤖 ИИ
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - 🛡️ VPN
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  - name: 🎮 Игры
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - 🇷🇺 Без VPN # по умолчанию напрямую, можно переключить
      - 🛡️ VPN
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  - name: 🎮 Лаунчеры
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Download.png
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - 🇷🇺 Без VPN # по умолчанию напрямую, можно переключить
      - 🛡️ VPN
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  - name: 🍷 Wine
    icon: https://api.iconify.design/mdi/glass-wine.svg?color=%23B11226&width=128&height=128
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - 🇷🇺 Без VPN # по умолчанию напрямую, можно переключить
      - 🛡️ VPN
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  - name: PROXY
    remnawave: # Кастомное поле используемое только в Remnawave
      include-proxies: false
    type: select
    hidden: true
    proxies:
      - 🛡️ VPN

  # ============================================================
  # GLOBAL — явное определение, чтобы mihomo не подмешивал в него
  # все сервисные узлы (gateway_*, fallback и т.д.).
  # При наличии группы с именем GLOBAL ядро использует её вместо
  # авто-сгенерированной, а include-proxies: false не даёт Remnawave
  # добавить туда сырые прокси из подписки.
  # ============================================================
  - name: GLOBAL
    remnawave:
      include-proxies: false
    type: select
    include-all-proxies: false
    include-all-providers: false
    proxies:
      - ⚡️ Автовыбор
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция
      - 🇷🇺 Без VPN
