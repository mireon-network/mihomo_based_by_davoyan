    interval: 600
    lazy: false
    timeout: 3000
    expected-status: 204
    max-failed-times: 3
    remnawave:
      include-proxies: false
    proxies:
      - 🇫🇮 Финляндия
      - 🇩🇪 Германия
      - 🇫🇷 Франция

  # ============================================================
  # КАТЕГОРИИ ВЫБОРА
  # ============================================================
  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - 🛡️ VPN
