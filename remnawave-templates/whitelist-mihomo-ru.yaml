mixed-port: 7890
mode: rule
log-level: silent
allow-lan: false
ipv6: true # для перехвата ipv6 трафика в ядро
unified-delay: true
tcp-concurrent: true
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  strict-route: true
  route-exclude-address: # исключаем из перехвата приватные и зарезервированные IP-адреса
    - 224.0.0.0/3
    - 10.0.0.0/8
    - 127.0.0.0/8
    - 100.64.0.0/10
    - 172.16.0.0/12
    - 169.254.0.0/16
    - 192.168.0.0/16
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 198.51.100.0/24
    - 203.0.113.0/24
    - fc00::/7
    - ff00::/8
    - fe80::/10
    - ::/127
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip # fake-ip/redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:geosite-private # исключить из fake-ip приватные домены
  default-nameserver:
    - https://77.88.8.8/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://77.88.8.8/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - https://77.88.8.8/dns-query
    - https://8.8.8.8/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#PROXY
sniffer:
  enable: true
  override-destination: false
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
  skip-dst-address: # исключить из сниффера приватные и зарезервированные IP-адреса
    - 224.0.0.0/3
    - 10.0.0.0/8
    - 127.0.0.0/8
    - 100.64.0.0/10
    - 172.16.0.0/12
    - 198.18.0.0/15
    - 169.254.0.0/16
    - 192.168.0.0/16
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 198.51.100.0/24
    - 203.0.113.0/24
    - fc00::/7
    - ff00::/8
    - fe80::/10
    - ::/127
find-process-mode: strict
profile:
  store-selected: true
  store-fake-ip: true
proxies: # LEAVE THIS LINE!
proxy-groups:
  - name: PROXY
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true # все узлы из подписки
rule-providers:
  geosite-private:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/metacubex/geosite/private.mrs
    path: ./ruleset/geosite-private.mrs
    proxy: PROXY
    interval: 86400
  geoip-private:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/metacubex/geoip/private.mrs
    path: ./ruleset/geoip-private.mrs
    proxy: PROXY
    interval: 86400
  whitelist:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/roscomvpn/mrs/whitelist.mrs
    path: ./ruleset/whitelist.mrs
    proxy: PROXY
    interval: 86400
  oisd_big:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/legiz-ru/oisd/big.mrs
    path: ./ruleset/oisd_big.mrs
    proxy: PROXY
    interval: 86400
  win-spy:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/roscomvpn/mrs/win-spy.mrs
    path: ./ruleset/win-spy.mrs
    proxy: PROXY
    interval: 86400
  torrent-trackers:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/legiz-ru/other/torrent-trackers.mrs
    path: ./ruleset/torrent-trackers.mrs
    proxy: PROXY
    interval: 86400
  torrent-domains:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/roscomvpn/mrs/torrent-domains.mrs
    path: ./ruleset/torrent-domains.mrs
    proxy: PROXY
    interval: 86400
  torrent-clients:
    type: http
    behavior: classical
    format: yaml
    url: https://cdn.jsdelivr.net/gh/mireon-network/mihomo_based_by_davoyan@main/rules/legiz-ru/other/torrent-clients.yaml
    path: ./ruleset/torrent-clients.yaml
    proxy: PROXY
    interval: 86400
  quic:
    type: inline
    behavior: classical
    payload:
      - AND,((NETWORK,udp),(DST-PORT,443))

rules:
  # --- Системные / приватные адреса ---
  - RULE-SET,geoip-private,DIRECT,no-resolve       # приватные IP — всегда напрямую, без DNS
  - IP-CIDR,::/0,REJECT-DROP,no-resolve            # весь IPv6-трафик, не попавший в fake-ip — блок
  - RULE-SET,quic,REJECT                           # QUIC — принудительно через TCP
  - RULE-SET,geosite-private,DIRECT                # локальные домены — напрямую

  # --- Блокировка рекламы и телеметрии Windows (опционально) ---
  - RULE-SET,oisd_big,REJECT       # Списки скомпилированные Legiz
  - RULE-SET,win-spy,REJECT-DROP   # Телеметрия Windows

  # --- Торренты → напрямую (DIRECT, опционально) ---
  - RULE-SET,torrent-clients,DIRECT
  - RULE-SET,torrent-trackers,DIRECT
  - RULE-SET,torrent-domains,DIRECT # +11 DHT/bootstrap-трекеров и матчинг поддоменов
  - PROCESS-NAME-REGEX,(?i).*torrent.*,DIRECT

  # --- Белый список доменов → напрямую (DIRECT) ---
  - RULE-SET,whitelist,DIRECT

  # --- Весь остальной трафик → PROXY ---
  - MATCH,PROXY
