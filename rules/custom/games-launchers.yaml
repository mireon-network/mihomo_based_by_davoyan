payload:
  # Лаунчеры игровых платформ. Категория подключается строкой
  # RULE-SET,games-launchers,🎮 Лаунчеры (по умолчанию селектор = DIRECT),
  # чтобы P2P/загрузки (Steam, VK Play и др.) не шли через VPN и не попадали
  # под блокировщик торрентов.
  # NB: это classical rule-set — действие (DIRECT/PROXY) здесь НЕ указывается,
  # его задаёт строка RULE-SET в шаблоне; хвостовое действие ядро игнорирует.

  # --- Steam ---
  - PROCESS-NAME,steam.exe
  - PROCESS-NAME,steamwebhelper.exe
  - PROCESS-NAME,steamservice.exe

  # --- Epic Games ---
  - PROCESS-NAME,EpicGamesLauncher.exe

  # --- EA / Origin ---
  - PROCESS-NAME,Origin.exe
  - PROCESS-NAME,EADesktop.exe

  # --- Ubisoft Connect ---
  - PROCESS-NAME,upc.exe
  - PROCESS-NAME,UbisoftConnect.exe

  # --- GOG / Playnite ---
  - PROCESS-NAME,GOGGalaxy.exe
  - PROCESS-NAME,playnite.exe

  # --- Blizzard / Battle.net ---
  - PROCESS-NAME,Battle.net.exe
  - PROCESS-NAME,BlizzardBrowser.exe

  # --- Riot Games ---
  - PROCESS-NAME,LeagueClient.exe
  - PROCESS-NAME,RiotClientServices.exe

  # --- Rockstar Games / Social Club ---
  - PROCESS-NAME-REGEX,(?i).*Rockstar.*
  - PROCESS-NAME-REGEX,(?i).*SocialClub.*

  # --- VK Play / MY.GAMES ---
  - PROCESS-NAME,GameCenter.exe
  - PROCESS-NAME,VKPlayLoader.exe
  - PROCESS-NAME,mycomgames.exe
  - DOMAIN-SUFFIX,vkplay.ru
  - DOMAIN-SUFFIX,my.games

  # --- HoYoverse (лаунчер / обновления) ---
  - PROCESS-NAME,HYUpdater.exe
  - PROCESS-NAME,HYP.exe
  - PROCESS-NAME,HYPHelper.exe

  # --- Xbox (Microsoft Store / PC Game Pass) ---
  - PROCESS-NAME,XboxApp.exe
  - PROCESS-NAME,XboxPcApp.exe

  # --- Bethesda ---
  - PROCESS-NAME,BethesdaNetLauncher.exe

  # --- Прочие лаунчеры (отдельные игры / платформы) ---
  - PROCESS-NAME,ApexLauncher.exe
  - PROCESS-NAME,ExecPubg.exe
  - PROCESS-NAME,BsgLauncher.exe
  - PROCESS-NAME,MarvelRivals_Launcher.exe
  - PROCESS-NAME,WoWSLauncher.exe
  - PROCESS-NAME,battalionlauncher.exe
  - PROCESS-NAME,steamlauncher.exe
  - PROCESS-NAME,launcher.exe
  - PROCESS-NAME,slauncher.exe
  - PROCESS-NAME,dundeflauncher.exe

  # =========================================================
  # macOS — имена бинарников внутри .app
  # =========================================================

  # --- Steam ---
  - PROCESS-NAME,steam_osx
  - PROCESS-NAME,steamwebhelper

  # --- Epic Games ---
  - PROCESS-NAME,EpicGamesLauncher
  - PROCESS-NAME,EpicWebHelper

  # --- EA / Origin ---
  - PROCESS-NAME,EADesktop
  - PROCESS-NAME,Origin

  # --- GOG Galaxy ---
  - PROCESS-NAME,GOG Galaxy

  # --- Blizzard / Battle.net ---
  - PROCESS-NAME,Battle.net
  - PROCESS-NAME,Battle.net Helper

  # --- Riot Games ---
  - PROCESS-NAME,LeagueClient
  - PROCESS-NAME,RiotClientServices

  # --- Heroic (Epic/GOG/Amazon, кроссплатформенный) ---
  - PROCESS-NAME,Heroic

  # =========================================================
  # Linux — имена бинарников
  # =========================================================

  # --- Steam ---
  - PROCESS-NAME,steam
  - PROCESS-NAME,steam.sh

  # --- Менеджеры/лаунчеры игр ---
  - PROCESS-NAME,lutris
  - PROCESS-NAME,heroic
  - PROCESS-NAME,bottles
  - PROCESS-NAME,minigalaxy
  - PROCESS-NAME,legendary          # Epic (CLI)
  - PROCESS-NAME,rare               # Epic (GUI к legendary)
  - PROCESS-NAME,nile               # Amazon Games (CLI)
  - PROCESS-NAME,gogdl              # GOG downloader (backend Heroic)
  - PROCESS-NAME,comet              # GOG Galaxy comms (backend Heroic)
  - PROCESS-NAME,cartridges         # агрегатор библиотек (Steam/Heroic/itch…)
  - PROCESS-NAME,itch               # itch.io app
  - PROCESS-NAME,gamehub            # GameHub

  # --- Faugus Launcher (запуск Windows-игр через UMU/Proton) ---
  - PROCESS-NAME,faugus-launcher
  - PROCESS-NAME,faugus-run
  - PROCESS-NAME,faugus-proton-manager   # менеджер версий Proton (загрузки)

  # --- UMU Launcher (общий runtime для Faugus / Lutris / Heroic) ---
  - PROCESS-NAME,umu-run
