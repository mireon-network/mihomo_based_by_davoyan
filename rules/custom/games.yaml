  # =========================================================
  # macOS / Linux — нативные сборки
  # ВНИМАНИЕ: игры под Steam Proton / Wine / CrossOver НЕ видны как game.exe —
  #           сетевым сокетом владеет общий процесс wineserver (или wine/wine64),
  #           одинаковый для всех игр. Их .exe-правила выше под Proton не
  #           срабатывают; этот трафик ловит отдельная категория «🍷 Wine»
  #           (см. rules/custom/wine.yaml). Здесь — только НАТИВНЫЕ порты,
  #           где имя бинарника отличается от Windows.
  # =========================================================

